{% extends "base.html" %}

{% block contenido %}
<div class="form-container">
    <h2>Crear una cuenta</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-button">Registrarse</button>
    </form>
    <div class="form-link">
        <p>¿Ya tienes una cuenta? <a href="{% url 'login'%}">Inicia sesión aquí</a></p>
    </div>
</div>
{% endblock %}
